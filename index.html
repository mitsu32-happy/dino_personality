<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="24問であなたの恐竜タイプを診断する、独自ロジックのエンタメ性格診断サイト。">
    <title>恐竜タイプ診断</title>
    <link rel="icon" href="./assets/images/ui/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <a class="brand" href="#home" aria-label="恐竜タイプ診断 トップへ">
          <img src="./assets/images/ui/logo.svg" alt="" width="38" height="38">
          <span>恐竜タイプ診断</span>
        </a>
        <nav class="nav" aria-label="メインナビゲーション">
          <a href="#quiz">診断</a>
          <a href="#dex">図鑑</a>
        </nav>
      </header>

      <main id="app" tabindex="-1">
        <section class="loading-view" aria-live="polite">
          <p>古代データを読み込んでいます...</p>
        </section>
      </main>
    </div>

    <template id="tpl-home">
      <section class="hero view-panel">
        <div class="hero-copy">
          <p class="eyebrow">24 questions / 5 axes / 16 dino types</p>
          <h1>あなたの中に眠る、古代の性格タイプを見つけよう。</h1>
          <p class="lead">決断力、協調性、探究心、慎重さ、スピード感。5つの軸から、あなたに近い恐竜タイプを診断します。</p>
          <div class="hero-actions">
            <a class="button primary" href="#quiz">診断をはじめる</a>
            <a class="button ghost" href="#dex">16タイプを見る</a>
          </div>
          <p class="notice">この診断は独自ロジックによるエンタメ性格診断です。</p>
        </div>
        <div class="hero-visual" aria-hidden="true">
          <div class="moon"></div>
          <div class="amber"></div>
          <div class="dino-scene">
            <div class="dino-real"></div>
            <div class="dino-mascot"></div>
          </div>
        </div>
      </section>
    </template>

    <template id="tpl-quiz">
      <section class="quiz view-panel">
        <div class="quiz-top">
          <button class="icon-button" data-action="back" type="button" aria-label="前の質問へ">←</button>
          <div class="progress-wrap" aria-label="診断の進捗">
            <div class="progress-meta">
              <span data-bind="question-count"></span>
              <span data-bind="progress-percent"></span>
            </div>
            <div class="progress-track"><div class="progress-bar" data-bind="progress-bar"></div></div>
          </div>
        </div>
        <article class="question-card">
          <p class="eyebrow" data-bind="question-id"></p>
          <h2 data-bind="question-text"></h2>
          <div class="options" data-bind="options"></div>
        </article>
      </section>
    </template>

    <template id="tpl-result">
      <section class="result view-panel">
        <div class="result-card" id="result-card">
          <div class="result-heading">
            <p class="eyebrow">Your dino type</p>
            <h1 data-bind="type-name"></h1>
            <p class="dino-name" data-bind="dino-name"></p>
            <p class="lead" data-bind="type-catch"></p>
          </div>
          <div class="result-visuals">
            <figure class="image-slot real">
              <img data-bind="real-image" alt="">
              <figcaption data-bind="real-caption"></figcaption>
            </figure>
            <figure class="image-slot mascot">
              <img data-bind="mascot-image" alt="">
              <figcaption>マスコット</figcaption>
            </figure>
          </div>
          <div class="result-grid">
            <div class="radar-panel">
              <canvas id="radar" width="320" height="320" aria-label="5軸スコアのレーダーチャート"></canvas>
            </div>
            <div class="score-panel" data-bind="score-list"></div>
          </div>
          <p class="description" data-bind="description"></p>
          <div class="detail-columns">
            <section>
              <h2>強み</h2>
              <ul data-bind="strengths"></ul>
            </section>
            <section>
              <h2>注意ポイント</h2>
              <ul data-bind="weaknesses"></ul>
            </section>
          </div>
          <div class="relations">
            <div><span>相性の良いタイプ</span><p data-bind="best-match"></p></div>
            <div><span>近いタイプ</span><p data-bind="near-types"></p></div>
          </div>
        </div>
        <div class="result-actions">
          <button class="button primary" data-action="save-card" type="button">結果画像を保存</button>
          <a class="button ghost" href="#quiz">もう一度診断</a>
          <a class="button ghost" href="#dex">図鑑を見る</a>
        </div>
        <p class="helper-text" data-bind="save-message" aria-live="polite"></p>
      </section>
    </template>

    <template id="tpl-dex">
      <section class="dex view-panel">
        <div class="section-heading">
          <p class="eyebrow">Dino index</p>
          <h1>16タイプ図鑑</h1>
          <p class="lead">各タイプの雰囲気を先に見たいときはこちら。カードを開くと詳細を確認できます。</p>
        </div>
        <div class="dex-grid" data-bind="dex-grid"></div>
      </section>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
