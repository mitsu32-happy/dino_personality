<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#070c11">
    <meta name="description" content="24問であなたの恐竜タイプを診断する、独自ロジックのエンタメ性格診断サイト。">
    <title>恐竜タイプ診断</title>
    <link rel="icon" href="./assets/images/ui/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div class="site-frame">
      <header class="app-header">
        <a class="menu-dot" href="#home" aria-label="トップへ">
          <img src="./assets/images/ui/logo.svg" alt="" width="32" height="32">
        </a>
        <nav class="pill-nav" aria-label="メインナビゲーション">
          <a href="#quiz">診断</a>
          <a href="#dex">図鑑</a>
        </nav>
      </header>

      <main id="app" class="app-main" tabindex="-1">
        <section class="loading-view" aria-live="polite">
          <p>古代データを読み込んでいます...</p>
        </section>
      </main>
    </div>

    <template id="tpl-home">
      <section class="screen home-screen">
        <div class="hero-art" aria-hidden="true">
          <div class="dna"></div>
          <div class="fossil"></div>
          <div class="amber-stone"></div>
          <div class="real-dino"></div>
          <div class="mascot-dino"></div>
        </div>
        <div class="home-copy">
          <p class="small-label">Ancient personality scan</p>
          <h1>恐竜タイプ<br>診断</h1>
          <p>あなたの中に眠る、古代の個性を発掘しよう。</p>
        </div>
        <a class="start-button" href="#quiz">
          <strong>診断を開始</strong>
          <span>24の質問であなたを診断</span>
        </a>
        <div class="feature-row" aria-label="診断の特徴">
          <div><b>24</b><span>質問</span></div>
          <div><b>5</b><span>診断軸</span></div>
          <div><b>16</b><span>タイプ</span></div>
        </div>
        <p class="disclaimer">独自ロジックによるエンタメ性格診断です。MBTI等の既存診断とは関係ありません。</p>
      </section>
    </template>

    <template id="tpl-quiz">
      <section class="screen quiz-screen">
        <div class="quiz-top">
          <button class="back-button" data-action="back" type="button" aria-label="前の質問へ">‹</button>
          <div class="progress-box">
            <div class="progress-meta">
              <span data-bind="question-count"></span>
              <span data-bind="progress-text"></span>
            </div>
            <div class="progress-track"><div class="progress-bar" data-bind="progress-bar"></div></div>
          </div>
        </div>
        <article class="question-panel">
          <p class="small-label" data-bind="question-id"></p>
          <h1 data-bind="question-text"></h1>
          <div class="option-list" data-bind="options"></div>
        </article>
        <div class="mascot-hint" aria-hidden="true">
          <div class="mini-mascot"></div>
          <p>直感で選んでね。正解はないよ！</p>
        </div>
      </section>
    </template>

    <template id="tpl-result">
      <section class="result-screen">
        <div class="result-card-shell">
          <article id="result-card" class="share-card" aria-label="保存用結果カード">
            <div class="card-bg" data-bind="card-bg"></div>
            <header class="card-topline">
              <span>恐竜タイプ診断</span>
              <time data-bind="diagnosis-date"></time>
            </header>
            <div class="type-heading">
              <p>あなたの恐竜タイプは...</p>
              <h1 data-bind="type-name"></h1>
              <h2 data-bind="dino-name"></h2>
            </div>
            <div class="dino-stage">
              <div class="real-result-art" data-bind="real-art"></div>
              <div class="mascot-result-art" data-bind="mascot-art"></div>
            </div>
            <p class="catch-copy" data-bind="type-catch"></p>
            <div class="card-insight">
              <div class="radar-wrap">
                <canvas id="radar" width="320" height="320" aria-label="5軸レーダーチャート"></canvas>
              </div>
              <div class="score-list" data-bind="score-list"></div>
            </div>
            <div class="card-strength">
              <span>あなたの強み</span>
              <p data-bind="card-strengths"></p>
            </div>
          </article>
        </div>

        <div class="result-actions">
          <button class="primary-button" data-action="save-card" type="button">結果画像を保存</button>
          <a class="secondary-button" href="#quiz">もう一度診断</a>
          <a class="secondary-button" href="#dex">図鑑を見る</a>
        </div>
        <p class="helper-text" data-bind="save-message" aria-live="polite"></p>

        <section class="result-detail">
          <h2 data-bind="detail-title"></h2>
          <p data-bind="description"></p>
          <div class="detail-grid">
            <section>
              <h3>強み</h3>
              <ul data-bind="strengths"></ul>
            </section>
            <section>
              <h3>注意ポイント</h3>
              <ul data-bind="weaknesses"></ul>
            </section>
            <section>
              <h3>相性の良いタイプ</h3>
              <p data-bind="best-match"></p>
            </section>
            <section>
              <h3>近いタイプ</h3>
              <p data-bind="near-types"></p>
            </section>
          </div>
        </section>
      </section>
    </template>

    <template id="tpl-dex">
      <section class="screen dex-screen">
        <div class="dex-heading">
          <p class="small-label">Dino index</p>
          <h1>16タイプ図鑑</h1>
          <p>気になるタイプをタップして、結果カード形式で見てみよう。</p>
        </div>
        <div class="dex-grid" data-bind="dex-grid"></div>
      </section>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
